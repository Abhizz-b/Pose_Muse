name: pose_muse
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_image_labeling: ^0.11.0
  google_mlkit_pose_detection: ^0.12.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  http: ^1.6.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#000000"
  android_gravity: fill
  android: true
  ios: true
flutter:
  uses-material-design: true

  assets:
    - assets/poses/
    - assets/poses.json
    - assets/images/app_icon.png